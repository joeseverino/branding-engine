name: release

# Publish to npm via Trusted Publishing (OIDC) on a version tag. No tokens:
# auth comes from GitHub's OIDC token, and npm attaches a provenance attestation.
# Cut a release with: npm version <patch|minor|major> && git push --follow-tags
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest

      - run: npm publish --provenance --access public
