name: workflow lint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  # actionlint is a required status check, so it must report on every PR — a
  # paths filter here would leave non-workflow PRs stuck "Expected".
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run actionlint
        uses: docker://rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9
        with:
          args: -color

      - name: Enforce SHA-pinned actions
        run: |
          fail=0
          while IFS= read -r ref; do
            ref="${ref%%#*}"
            ref="$(echo "$ref" | xargs)"
            [ -z "$ref" ] && continue
            case "$ref" in
              ./*) ;;
              docker://*@sha256:*) ;;
              *@*)
                sha="${ref##*@}"
                if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
                  echo "::error::Action must be pinned to a 40-char commit SHA: $ref"
                  fail=1
                fi
                ;;
              *)
                echo "::error::Action has no pinned ref: $ref"
                fail=1
                ;;
            esac
          done < <(grep -rhE '^[[:space:]]*-?[[:space:]]*uses:' .github/workflows/ | sed -E 's/^[[:space:]]*-?[[:space:]]*uses:[[:space:]]*//')
          exit $fail
